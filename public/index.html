<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Epayroll</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #f3f8f5;
        color: #193228;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(84, 205, 147, 0.22), transparent 34%),
          #f3f8f5;
      }

      main {
        width: min(92vw, 32rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 42px rgba(28, 79, 56, 0.12);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        padding: 0.85rem 1.2rem;
        border-radius: 999px;
        background: #54cd93;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
    <script>
      window.location.replace("https://epayroll.cloud");
    </script>
  </head>
  <body>
    <main>
      <h1>Epayroll</h1>
      <p>กำลังเชื่อมต่อระบบ หากไม่เปลี่ยนหน้าอัตโนมัติให้กดปุ่มด้านล่าง</p>
      <a href="https://epayroll.cloud">เปิด Epayroll</a>
    </main>
  </body>
</html>
