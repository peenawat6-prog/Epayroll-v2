name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/cafe_saas?sslmode=require
      DIRECT_URL: postgresql://user:password@localhost:5432/cafe_saas?sslmode=require
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-placeholder
      CRON_SECRET: ci-cron-placeholder
      ATTENDANCE_PHOTO_STORAGE_BACKEND: local
      ATTENDANCE_PHOTO_STORAGE_DIR: storage/check-in-photos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify
